name: Lint

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - ".github/workflows/deploy.yaml"
      - ".vscode/**"
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: ${{github.workflow}}-${{ github.ref }}
  cancel-in-progress: true # 最後のみ実行

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Build with mock
        env:
          MICROCMS_SERVICE_DOMAIN: dummy_domain
          MICROCMS_API_KEY: dummy_key
        run: pnpm run build:mock

      - name: Run lint
        run: pnpm run lint
